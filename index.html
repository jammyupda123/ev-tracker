<body>

  <!-- PWA: manifest + apple-touch-icon 동적 생성 (단일 HTML 유지) -->
  <script>
    (function () {
      var iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#0F172A"/><text x="96" y="138" font-size="110" text-anchor="middle" fill="#F59E0B" font-family="sans-serif">⚡</text></svg>';
      var iconUrl = 'data:image/svg+xml;utf8,' + encodeURIComponent(iconSvg);
      var manifest = {
        name: "EV 충전기 트래커",
        short_name: "EV 트래커",
        start_url: "./",
        scope: "./",
        display: "standalone",

        theme_color: "#0F172A",
        icons: [{ src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" }]

      var mLink = document.createElement('link');
      mLink.rel = 'manifest';
      mLink.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
      document.head.appendChild(mLink);
      var tLink = document.createElement('link');
      tLink.rel = 'apple-touch-icon';
      tLink.href = iconUrl;
      document.head.appendChild(tLink);
      var fLink = document.createElement('link');
      fLink.rel = 'icon';
      fLink.type = 'image/svg+xml';
      fLink.href = iconUrl;
      document.head.appendChild(fLink);
    })();
  </script>

  <script type="text/babel" data-type="module" data-presets="env,react">
    // ====================================================================
    // 🔥 Firebase 설정 — 본인 값으로 수정하세요
    // Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱 → SDK 설정 및 구성에서 복사
    // ====================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCn74ILvzpGcVsJKxGPi1-tNWX54Dj2MJY",
      authDomain: "ev-tracker-a29b3.firebaseapp.com",
      projectId: "ev-tracker-a29b3",
      storageBucket: "ev-tracker-a29b3.firebasestorage.app",
      messagingSenderId: "62785593665",
      appId: "1:62785593665:web:23f6d13c8231011a2441c0"
    };
    // ====================================================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // 공유 모드: 인증 없음 (모든 사용자가 같은 데이터 사용)

    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, Legend, PieChart, Pie } = Recharts;

    // ============================================================
    // 아이콘 (Lucide SVG path 직접 작성)
    // ============================================================
    const I = ({ children, size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const Icons = {
      Search: (p) => <I {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></I>,
      Plus: (p) => <I {...p}><path d="M5 12h14"/><path d="M12 5v14"/></I>,
      LayoutGrid: (p) => <I {...p}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></I>,
      BarChart3: (p) => <I {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></I>,
      ChevronLeft: (p) => <I {...p}><path d="m15 18-6-6 6-6"/></I>,
      Trash2: (p) => <I {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></I>,
      Save: (p) => <I {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></I>,
      Building2: (p) => <I {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></I>,
      Zap: (p) => <I {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></I>,
      Filter: (p) => <I {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></I>,
      DollarSign: (p) => <I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></I>,
      TrendingUp: (p) => <I {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></I>,
      Clock: (p) => <I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></I>,
      CheckCircle2: (p) => <I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></I>,
      LogOut: (p) => <I {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></I>,
      LogIn: (p) => <I {...p}><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></I>,
    };

    // ============================================================
    // 상수 및 enum 정의
    // ============================================================
    const STAGES = ['영업', '현장실사', '설계/견적', '계약', '착공', '시공', '준공', '정산'];

    const ENUMS = {
      투자유형: ['자체투자', '26환경부(완속)', '기타'],
      사업유형: ['신규', '교체', '철거'],
      공용비공용: ['공용', '비공용', '부분공용'],
      설치환경: ['실내', '실외'],
      수전방식: ['단가계약', '모자분리', '신규수전(지중)', '신규수전(가공)'],
      OX: ['', 'O', 'X'],
      투심여부: ['', 'O', 'X', '불필요'],
      영업진행: ['', '접수', '상담', '검토', '보류', '취소', '완료'],
      실사진행: ['', '일정조율', '보류', '취소', '완료'],
      설계진행: ['', '설계/견적', '보류', '취소', '완료'],
      계약진행: ['', '계약검토', '제안', '계약진행', '계약완료', '보류', '취소'],
      착공진행: ['', '서류접수', '서류완료', '일정조율', '보류', '취소', '착공완료'],
      시공진행: ['', '공사중', '공사완료', '보류'],
      준공진행: ['', '미제출', '제출', '완료'],
      정산진행: ['', '미승인', '승인진행', '승인완료'],
    };

    const KW_RATED = { 과금형: 3, '7kW벽부': 7, '7kW스탠드': 7, '50kW': 53, '100kW': 105 };
    const CHARGER_TYPES = ['과금형', '7kW벽부', '7kW스탠드', '50kW', '100kW'];
    const CHART_COLORS = ['#1E293B', '#334155', '#475569', '#64748B', '#94A3B8', '#CBD5E1'];

    // 진행 상태 분석용
    const STAGE_DEFS = [
      { key: '영업진행', label: '영업' },
      { key: '실사진행', label: '실사' },
      { key: '설계진행', label: '설계/견적' },
      { key: '계약진행', label: '계약' },
      { key: '착공진행', label: '착공' },
      { key: '시공진행', label: '시공' },
      { key: '준공진행', label: '준공' },
      { key: '정산진행', label: '정산' },
    ];
    const COMPLETED_VALUES = new Set(['완료', '계약완료', '착공완료', '공사완료', '승인완료']);
    const PROBLEM_VALUES = new Set(['보류', '취소']);

    // 사이트의 진행 상태와 다음 액션 계산
    const getProgress = (site) => {
      const statuses = STAGE_DEFS.map((s) => {
        const v = site[s.key];
        let status;
        if (!v) status = 'empty';
        else if (COMPLETED_VALUES.has(v)) status = 'done';
        else if (PROBLEM_VALUES.has(v)) status = 'problem';
        else status = 'active';
        return { ...s, value: v, status };
      });

      // 다음 액션 결정 우선순위: problem → active → next empty → done
      let nextAction = '';
      let actionType = 'next';

      const problemIdx = statuses.findIndex((s) => s.status === 'problem');
      const activeIdx = statuses.findIndex((s) => s.status === 'active');

      if (problemIdx >= 0) {
        nextAction = `${statuses[problemIdx].label} ${statuses[problemIdx].value}`;
        actionType = 'problem';
      } else if (activeIdx >= 0) {
        nextAction = `${statuses[activeIdx].label} · ${statuses[activeIdx].value}`;
        actionType = 'active';
      } else {
        // 마지막 done 다음 빈 단계 찾기
        let lastDoneIdx = -1;
        statuses.forEach((s, i) => { if (s.status === 'done') lastDoneIdx = i; });
        const nextIdx = lastDoneIdx + 1;
        if (lastDoneIdx === -1 && !statuses.some((s) => s.status !== 'empty')) {
          // 아무 단계도 시작 안 됨
          nextAction = `${STAGE_DEFS[0].label} 시작`;
          actionType = 'next';
        } else if (nextIdx < statuses.length) {
          nextAction = `${statuses[nextIdx].label} 시작 필요`;
          actionType = 'next';
        } else {
          nextAction = '모든 단계 완료';
          actionType = 'done';
        }
      }

      const progressRate = Math.round((
        statuses.filter((s) => s.status === 'done').length
        + statuses.filter((s) => s.status === 'active').length * 0.5
      ) / STAGE_DEFS.length * 100);

      return { statuses, nextAction, actionType, progressRate };
    };

    const PROGRESS_COLOR_MAP = {
      done: 'bg-emerald-500',
      active: 'bg-amber-500',
      problem: 'bg-red-400',
      empty: 'bg-stone-200',
    };
    const ACTION_STYLE = {
      next: 'text-stone-600',
      active: 'text-amber-700',
      problem: 'text-red-600 font-semibold',
      done: 'text-emerald-700 font-semibold',
    };
    const ACTION_PREFIX = {
      next: '다음: ',
      active: '진행 중: ',
      problem: '⚠️ ',
      done: '✅ ',
    };

    const STAGE_BADGE_COLORS = {
      '영업': 'bg-blue-100 text-blue-800 border-blue-200',
      '현장실사': 'bg-green-100 text-green-800 border-green-200',
      '설계/견적': 'bg-yellow-100 text-yellow-800 border-yellow-200',
      '계약': 'bg-orange-100 text-orange-800 border-orange-200',
      '착공': 'bg-purple-100 text-purple-800 border-purple-200',
      '시공': 'bg-red-100 text-red-800 border-red-200',
      '준공': 'bg-cyan-100 text-cyan-800 border-cyan-200',
      '정산': 'bg-emerald-100 text-emerald-800 border-emerald-200',
    };

    // ============================================================
    // 헬퍼
    // ============================================================
    const getAutoStage = (s) => {
      if (s.정산진행) return '정산';
      if (s.준공진행) return '준공';
      if (s.시공진행) return '시공';
      if (s.착공진행) return '착공';
      if (s.계약진행) return '계약';
      if (s.설계진행) return '설계/견적';
      if (s.실사진행) return '현장실사';
      if (s.영업진행) return '영업';
      return '';
    };

    const getTotalKw = (s) => CHARGER_TYPES.reduce((sum, t) => sum + (Number(s[t] || 0) * KW_RATED[t]), 0);
    const getTotalChannels = (s) => CHARGER_TYPES.reduce((sum, t) => {
      const mult = t === '100kW' ? 2 : 1;
      return sum + Number(s[t] || 0) * mult;
    }, 0);

    const getMargin = (s) => {
      const rev = Number(s.공사매출 || 0);
      const cost = Number(s.공사매입 || 0);
      const sub = Number(s.보조금 || 0);
      return rev - (cost - sub);
    };

    const getMarginRate = (s) => {
      const rev = Number(s.공사매출 || 0);
      if (!rev) return 0;
      return getMargin(s) / rev;
    };

    // 자동 계산: 시공단 스탠드 수량 = SP + SPC
    const getStandQtySi = (s) => Number(s.SP || 0) + Number(s.SPC || 0);

    // 자동 계산: 시공단 총 용량
    const getTotalKwSi = (s) =>
      Number(s.시공_과금형_수량 || 0) * 3 +
      Number(s.시공_벽부_수량 || 0) * 7 +
      getStandQtySi(s) * 7 +
      Number(s.시공_50kW_수량 || 0) * 53 +
      Number(s.시공_100kW_수량 || 0) * 105;

    // 자동 계산: 매입 자동 합계
    const getMaipAutoSum = (s) =>
      Number(s.시설부담금 || 0) + Number(s.사용전검사 || 0) +
      Number(s.감리선임_매입 || 0) + Number(s.전기안전관리자 || 0) +
      Number(s.전기안전점검_매입 || 0) + Number(s.시공비_매입 || 0) +
      Number(s.캐노피_매입 || 0) + Number(s.영업비 || 0) + Number(s.부지사용료 || 0);

    const formatCurrency = (n) => {
      if (!n) return '—';
      if (n >= 100000000) return `${(n / 100000000).toFixed(1)}억`;
      if (n >= 10000) return `${(n / 10000).toFixed(0)}만`;
      return n.toLocaleString();
    };

    // ============================================================
    // 최상위 App (공유 모드 - 인증 없음)
    // ============================================================
    function App() {
      return <AppContent />;
    }

    function AppContent() {
      const [view, setView] = useState('list');
      const [sites, setSites] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterStage, setFilterStage] = useState('전체');
      const [sortBy, setSortBy] = useState('recent');

      useEffect(() => {
        const sitesCol = db.collection('sites');
        const unsub = sitesCol.onSnapshot(
          (snap) => {
            setSites(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
            setLoading(false);
          },
          (err) => {
            console.error('Firestore error', err);
            alert('데이터 로드 실패: ' + err.message);
            setLoading(false);
          }
        );
        return unsub;
      }, []);

      const saveSite = async (site) => {
        try {
          const id = site.id || `s_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
          const data = {
            ...site,
            id,
            등록일자: site.등록일자 || new Date().toISOString().slice(0, 10),
            updatedAt: new Date().toISOString(),
          };
          await db.collection('sites').doc(id).set(data);
          return id;
        } catch (e) {
          console.error('save error', e);
          alert('저장 실패: ' + e.message);
          return null;
        }
      };

      const deleteSite = async (id) => {
        if (!confirm('정말 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
        try {
          await db.collection('sites').doc(id).delete();
          setView('list');
          setSelectedId(null);
        } catch (e) {
          console.error('delete error', e);
          alert('삭제 실패: ' + e.message);
        }
      };

      const selectedSite = sites.find((s) => s.id === selectedId);

      return (
        <div className="min-h-screen bg-stone-50">
          <Header view={view} setView={setView} onNew={() => { setSelectedId(null); setView('editor'); }} />
          <main className="max-w-7xl mx-auto px-6 py-8">
            {loading ? (
              <div className="text-center py-20 text-stone-500">불러오는 중…</div>
            ) : view === 'list' ? (
              <SiteList sites={sites} searchTerm={searchTerm} setSearchTerm={setSearchTerm}
                filterStage={filterStage} setFilterStage={setFilterStage}
                sortBy={sortBy} setSortBy={setSortBy}
                onEdit={(id) => { setSelectedId(id); setView('editor'); }}
                onNew={() => { setSelectedId(null); setView('editor'); }} />
            ) : view === 'editor' ? (
              <SiteEditor site={selectedSite} onSave={saveSite} onDelete={deleteSite}
                onCancel={() => { setView('list'); setSelectedId(null); }} />
            ) : (
              <Dashboard sites={sites} />
            )}
          </main>
        </div>
      );
    }

    function Header({ view, setView, onNew }) {
      return (
        <header className="bg-slate-900 text-white border-b-4 border-amber-500">
          <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-2">
            <div>
              <h1 className="text-xl font-bold tracking-tight">전기차 충전기 워크플로우 트래커</h1>
              <p className="text-xs text-stone-400 mt-0.5">CPO 영업~구축 전공정 관리 v1.0 · 공유 모드</p>
            </div>
            <nav className="flex items-center gap-2 flex-wrap">
              <NavButton active={view === 'list'} onClick={() => setView('list')} IconComp={Icons.LayoutGrid}>사이트</NavButton>
              <NavButton active={view === 'dashboard'} onClick={() => setView('dashboard')} IconComp={Icons.BarChart3}>대시보드</NavButton>
              <button onClick={onNew}
                className="ml-2 px-4 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-semibold rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-amber-300">
                <Icons.Plus size={16} /> 새 사이트
              </button>
            </nav>
          </div>
        </header>
      );
    }

    function NavButton({ active, onClick, IconComp, children }) {
      return (
        <button onClick={onClick}
          className={`px-3 py-2 text-sm rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-amber-400 ${
            active ? 'bg-white text-slate-900 font-semibold' : 'text-stone-300 hover:text-white hover:bg-white/10'
          }`}>
          <IconComp size={16} /> {children}
        </button>
      );
    }

    function SiteList({ sites, searchTerm, setSearchTerm, filterStage, setFilterStage, sortBy, setSortBy, onEdit, onNew }) {
      const filtered = useMemo(() => {
        const term = searchTerm.toLowerCase();
        const enriched = sites.map((s) => {
          const prog = getProgress(s);
          return {
            ...s,
            _stage: getAutoStage(s),
            _progressRate: prog.progressRate,
            _hasProblem: prog.statuses.some((st) => st.status === 'problem'),
          };
        });
        const result = enriched.filter((s) => {
          if (filterStage === '⚠️ 보류 있음') {
            if (!s._hasProblem) return false;
          } else if (filterStage !== '전체') {
            if (s._stage !== filterStage) return false;
          }
          if (!term) return true;
          return (
            (s.현장명 || '').toLowerCase().includes(term) ||
            (s.지역 || '').includes(term) ||
            (s.주소 || '').includes(term)
          );
        });
        if (sortBy === 'progressLow') {
          result.sort((a, b) => a._progressRate - b._progressRate);
        } else if (sortBy === 'progressHigh') {
          result.sort((a, b) => b._progressRate - a._progressRate);
        } else {
          result.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
        }
        return result;
      }, [sites, searchTerm, filterStage, sortBy]);

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-stone-900">사이트 목록</h2>
              <p className="text-sm text-stone-500 mt-1">
                전체 <span className="num-mono font-semibold text-stone-900">{sites.length}</span>개 ·
                필터 결과 <span className="num-mono font-semibold text-stone-900">{filtered.length}</span>개
              </p>
            </div>
          </div>

          <div className="flex items-center gap-3 mb-6 flex-wrap">
            <div className="relative flex-1 min-w-[200px] max-w-md">
              <Icons.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" />
              <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                placeholder="현장명·지역·주소 검색"
                className="w-full pl-10 pr-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800" />
            </div>
            <div className="flex items-center gap-2">
              <Icons.Filter size={14} className="text-stone-500" />
              <select value={filterStage} onChange={(e) => setFilterStage(e.target.value)}
                className="px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800">
                <option>전체</option>
                {STAGES.map((s) => <option key={s}>{s}</option>)}
                <option>⚠️ 보류 있음</option>
              </select>
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-stone-500">정렬</span>
              <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}
                className="px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800">
                <option value="recent">최근 수정순</option>
                <option value="progressLow">공정률 낮은 순</option>
                <option value="progressHigh">공정률 높은 순</option>
              </select>
            </div>
          </div>

          {filtered.length === 0 ? (
            <EmptyState onNew={onNew} hasData={sites.length > 0} />
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map((s) => <SiteCard key={s.id} site={s} onClick={() => onEdit(s.id)} />)}
            </div>
          )}
        </div>
      );
    }

    function EmptyState({ onNew, hasData }) {
      return (
        <div className="bg-white border border-stone-200 border-dashed rounded-lg py-16 px-6 text-center">
          <div className="inline-flex items-center justify-center w-12 h-12 bg-stone-100 rounded-full mb-4">
            {hasData ? <Icons.Search size={20} className="text-stone-400" /> : <Icons.Building2 size={20} className="text-stone-400" />}
          </div>
          <p className="text-stone-700 font-medium mb-1">{hasData ? '검색 결과가 없습니다' : '등록된 사이트가 없습니다'}</p>
          <p className="text-sm text-stone-500 mb-4">
            {hasData ? '검색어나 필터를 변경해보세요' : '첫 사이트를 등록하여 시작하세요'}
          </p>
          {!hasData && (
            <button onClick={onNew}
              className="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium rounded transition-colors inline-flex items-center gap-1.5">
              <Icons.Plus size={16} /> 새 사이트 등록
            </button>
          )}
        </div>
      );
    }

    function SiteCard({ site, onClick }) {
      const stage = getAutoStage(site);
      const channels = getTotalChannels(site);
      const kw = getTotalKw(site);
      const marginRate = getMarginRate(site);
      const { statuses, nextAction, actionType, progressRate } = getProgress(site);

      return (
        <button onClick={onClick}
          className="bg-white border border-stone-200 rounded-lg p-5 text-left hover:border-slate-800 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-slate-800 focus:ring-offset-2">
          <div className="flex items-start justify-between mb-3">
            <div className="flex-1 min-w-0">
              <h3 className="font-semibold text-stone-900 truncate">{site.현장명 || '(이름 없음)'}</h3>
              <p className="text-xs text-stone-500 mt-0.5 truncate">{site.지역 || '—'} · {site.건물유형 || '—'}</p>
            </div>
            {stage && <span className={`shrink-0 px-2 py-0.5 text-xs font-medium rounded border ${STAGE_BADGE_COLORS[stage]}`}>{stage}</span>}
          </div>

          {/* 공정률 + 진행 막대 + 다음 액션 */}
          <div className="mb-3">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[10px] text-stone-500 uppercase tracking-wider font-medium">공정률</span>
              <span className="text-xs font-bold text-stone-900 num-mono">{progressRate}%</span>
            </div>
            <div className="flex gap-0.5 mb-1.5">
              {statuses.map((s) => (
                <div key={s.key} className={`flex-1 h-1.5 rounded-sm ${PROGRESS_COLOR_MAP[s.status]}`}
                  title={`${s.label}: ${s.value || '미진행'}`} />
              ))}
            </div>
            <p className={`text-xs ${ACTION_STYLE[actionType]} truncate`}>
              {ACTION_PREFIX[actionType]}{nextAction}
            </p>
          </div>

          <div className="grid grid-cols-3 gap-2 text-center pt-3 border-t border-stone-100">
            <Stat label="채널" value={channels || '—'} />
            <Stat label="kW" value={kw || '—'} />
            <Stat label="마진률" value={marginRate ? `${(marginRate * 100).toFixed(1)}%` : '—'} />
          </div>
        </button>
      );
    }

    function Stat({ label, value }) {
      return (
        <div>
          <div className="text-base font-semibold text-stone-900 num-mono">{value}</div>
          <div className="text-[10px] text-stone-500 uppercase tracking-wider mt-0.5">{label}</div>
        </div>
      );
    }

    function SiteEditor({ site, onSave, onDelete, onCancel }) {
      const [draft, setDraft] = useState(site || {});
      const [activeTab, setActiveTab] = useState('영업');
      const [saving, setSaving] = useState(false);

      useEffect(() => { setDraft(site || {}); }, [site]);
      const update = (k, v) => setDraft((d) => ({ ...d, [k]: v }));
      const isDirty = useMemo(() => JSON.stringify(site || {}) !== JSON.stringify(draft || {}), [site, draft]);
      const hasName = !!(draft.현장명 && draft.현장명.trim());
      const { statuses, nextAction, actionType, progressRate } = useMemo(() => getProgress(draft), [draft]);

      const handleSave = async () => {
        if (!hasName) { alert('현장명은 필수입니다'); setActiveTab('영업'); return; }
        setSaving(true);
        await onSave(draft);
        setSaving(false);
        onCancel();
      };

      const handleBack = async () => {
        if (!isDirty) { onCancel(); return; }
        if (hasName) {
          setSaving(true);
          await onSave(draft);
          setSaving(false);
          onCancel();
        } else if (confirm('현장명이 비어있어 저장할 수 없습니다. 변경 사항을 폐기하고 목록으로 돌아갈까요?')) {
          onCancel();
        }
      };

      const tabs = ['영업', '현장실사', '설계/견적', '계약', '착공', '시공', '준공', '정산', '비고'];

      return (
        <div>
          <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
            <button onClick={handleBack}
              className="flex items-center gap-1.5 px-3 py-2 text-sm text-stone-700 hover:bg-stone-100 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-stone-400">
              <Icons.ChevronLeft size={16} /> 목록으로
              {isDirty && hasName && <span className="ml-1 text-xs text-emerald-700 font-medium">(자동 저장)</span>}
            </button>
            <div className="flex items-center gap-2">
              {isDirty && <span className="text-xs text-amber-700 font-medium px-2 py-1 bg-amber-50 rounded">변경 사항 있음</span>}
              {site && (
                <button onClick={() => onDelete(site.id)}
                  className="px-3 py-2 text-sm text-red-700 hover:bg-red-50 rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-red-400">
                  <Icons.Trash2 size={14} /> 삭제
                </button>
              )}
              <button onClick={handleSave} disabled={saving || !hasName}
                className="px-5 py-2 bg-slate-900 hover:bg-slate-800 disabled:bg-stone-300 disabled:text-stone-500 disabled:cursor-not-allowed text-white text-sm font-semibold rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-amber-400">
                <Icons.Save size={14} /> {saving ? '저장 중…' : '저장하기'}
              </button>
            </div>
          </div>

          <div className="bg-white border border-stone-200 rounded-lg overflow-hidden">
            <div className="px-6 pt-6 pb-4 border-b border-stone-100">
              <h2 className="text-xl font-bold text-stone-900">
                {site ? draft.현장명 || '(이름 없음)' : '새 사이트 등록'}
              </h2>
              {site && (
                <p className="text-xs text-stone-500 mt-1 num-mono">
                  등록 {site.등록일자 || '—'} · 자동 단계 [{getAutoStage(draft) || '—'}]
                </p>
              )}
              <div className="mt-4">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-[10px] text-stone-500 uppercase tracking-wider font-medium">공정률</span>
                  <span className="text-sm font-bold text-stone-900 num-mono">{progressRate}%</span>
                </div>
                <div className="flex gap-0.5 mb-1.5">
                  {statuses.map((s) => (
                    <div key={s.key} className={`flex-1 h-2 rounded-sm ${PROGRESS_COLOR_MAP[s.status]}`}
                      title={`${s.label}: ${s.value || '미진행'}`} />
                  ))}
                </div>
                <p className={`text-xs ${ACTION_STYLE[actionType]}`}>
                  {ACTION_PREFIX[actionType]}{nextAction}
                </p>
              </div>
            </div>

            <div className="px-6 border-b border-stone-100 flex gap-1 overflow-x-auto">
              {tabs.map((t) => (
                <button key={t} onClick={() => setActiveTab(t)}
                  className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-inset ${
                    activeTab === t ? 'border-slate-800 text-slate-800 bg-stone-50' : 'border-transparent text-stone-600 hover:text-stone-900 hover:bg-stone-50'
                  }`}>
                  {t}
                </button>
              ))}
            </div>

            <div className="p-6">
              {activeTab === '영업' && <영업Form draft={draft} update={update} />}
              {activeTab === '현장실사' && <현장실사Form draft={draft} update={update} />}
              {activeTab === '설계/견적' && <설계견적Form draft={draft} update={update} />}
              {activeTab === '계약' && <계약Form draft={draft} update={update} />}
              {activeTab === '착공' && <착공Form draft={draft} update={update} />}
              {activeTab === '시공' && <시공Form draft={draft} update={update} />}
              {activeTab === '준공' && <준공Form draft={draft} update={update} />}
              {activeTab === '정산' && <정산Form draft={draft} update={update} />}
              {activeTab === '비고' && <비고Form draft={draft} update={update} />}
            </div>
          </div>
        </div>
      );
    }

    const Field = ({ label, children, required }) => (
      <div>
        <label className="block text-xs font-semibold text-stone-600 mb-1.5 uppercase tracking-wider">
          {label} {required && <span className="text-red-500">*</span>}
        </label>
        {children}
      </div>
    );

    const TextInput = ({ value, onChange, placeholder, type = 'text' }) => (
      <input type={type} value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800" />
    );

    const NumInput = ({ value, onChange, placeholder }) => (
      <input type="number" value={value ?? ''}
        onChange={(e) => onChange(e.target.value === '' ? '' : Number(e.target.value))} placeholder={placeholder}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm num-mono focus:outline-none focus:border-slate-800" />
    );

    const Select = ({ value, onChange, options, placeholder }) => (
      <select value={value || ''} onChange={(e) => onChange(e.target.value)}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800">
        <option value="">{placeholder || '선택…'}</option>
        {options.filter((o) => o).map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    );

    const MultiCheck = ({ value = [], onChange, options }) => {
      const set = new Set(value);
      const toggle = (o) => {
        const next = new Set(set);
        if (next.has(o)) next.delete(o); else next.add(o);
        onChange(Array.from(next));
      };
      return (
        <div className="flex flex-wrap gap-2">
          {options.map((o) => (
            <button key={o} type="button" onClick={() => toggle(o)}
              className={`px-3 py-1.5 text-sm border rounded transition-colors ${
                set.has(o) ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-stone-300 text-stone-700 hover:border-stone-400'
              }`}>
              {o}
            </button>
          ))}
        </div>
      );
    };

    // 공통 헬퍼 컴포넌트
    const FormSection = ({ title, children }) => (
      <div>
        <h3 className="text-xs font-bold text-stone-700 uppercase tracking-wider mb-3 pb-2 border-b border-stone-200">{title}</h3>
        <div className="space-y-4">{children}</div>
      </div>
    );

    const AutoBox = ({ label, value, unit, color = 'text-slate-800' }) => (
      <div className="px-3 py-2 bg-stone-50 border border-stone-200 rounded text-sm flex items-center justify-between">
        <span className="text-stone-500 text-xs">{label}</span>
        <span className={`font-bold num-mono ${color}`}>
          {value}{unit && <span className="text-xs text-stone-400 ml-1">{unit}</span>}
        </span>
      </div>
    );

    const Textarea = ({ value, onChange, placeholder, rows = 3 }) => (
      <textarea value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} rows={rows}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800 resize-y" />
    );

    // ============================================================
    // 영업 탭 (34개 필드)
    // ============================================================
    function 영업Form({ draft, update }) {
      const totalKw = getTotalKw(draft);
      const totalCh = getTotalChannels(draft);
      return (
        <div className="space-y-6">
          <FormSection title="기본 정보">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="현장명" required><TextInput value={draft.현장명} onChange={(v) => update('현장명', v)} placeholder="예: 서울 강남 OO빌딩" /></Field>
              <Field label="지역"><TextInput value={draft.지역} onChange={(v) => update('지역', v)} placeholder="예: 서울" /></Field>
            </div>
            <Field label="주소"><TextInput value={draft.주소} onChange={(v) => update('주소', v)} /></Field>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="건물유형"><TextInput value={draft.건물유형} onChange={(v) => update('건물유형', v)} placeholder="예: 아파트, 오피스텔" /></Field>
              <Field label="투자유형"><Select value={draft.투자유형} onChange={(v) => update('투자유형', v)} options={ENUMS.투자유형} /></Field>
            </div>
            <Field label="사업유형 (다중 선택)"><MultiCheck value={draft.사업유형} onChange={(v) => update('사업유형', v)} options={ENUMS.사업유형} /></Field>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <Field label="공용/비공용"><Select value={draft.공용비공용} onChange={(v) => update('공용비공용', v)} options={ENUMS.공용비공용} /></Field>
              <Field label="설치환경"><Select value={draft.설치환경} onChange={(v) => update('설치환경', v)} options={ENUMS.설치환경} /></Field>
              <Field label="주차면 수"><NumInput value={draft.주차면} onChange={(v) => update('주차면', v)} /></Field>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <Field label="의무수량"><NumInput value={draft.의무수량} onChange={(v) => update('의무수량', v)} /></Field>
              <Field label="주차 시작층"><TextInput value={draft.주차_시작층} onChange={(v) => update('주차_시작층', v)} placeholder="예: B1" /></Field>
              <Field label="예상 설치위치(층)"><TextInput value={draft.예상_설치위치} onChange={(v) => update('예상_설치위치', v)} placeholder="예: B2" /></Field>
            </div>
          </FormSection>

          <FormSection title="충전기 종류 (영업 예상)">
            <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
              {CHARGER_TYPES.map((t) => (
                <Field key={t} label={`${t} (개)`}><NumInput value={draft[t]} onChange={(v) => update(t, v)} placeholder="0" /></Field>
              ))}
            </div>
            <div className="grid grid-cols-2 gap-3">
              <AutoBox label="총 채널 (개)" value={totalCh || '—'} />
              <AutoBox label="총 용량 (kW)" value={totalKw || '—'} />
            </div>
            <p className="text-xs text-stone-500">정격: 과금형 3, 7kW 7, 50kW 53, 100kW 105. 100kW만 2채널.</p>
          </FormSection>

          <FormSection title="신청자 (발주자)">
            <Field label="이름 (소속/직책)"><TextInput value={draft.신청자_이름} onChange={(v) => update('신청자_이름', v)} placeholder="홍길동 / OO그룹 부장" /></Field>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="연락처"><TextInput value={draft.신청자_연락처} onChange={(v) => update('신청자_연락처', v)} /></Field>
              <Field label="메일"><TextInput type="email" value={draft.신청자_메일} onChange={(v) => update('신청자_메일', v)} /></Field>
            </div>
          </FormSection>

          <FormSection title="HEV 담당자 + 현장담당자">
            <Field label="HEV 영업 담당자"><TextInput value={draft.HEV영업담당자} onChange={(v) => update('HEV영업담당자', v)} /></Field>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="현장담당자 이름"><TextInput value={draft.현장담당자_이름} onChange={(v) => update('현장담당자_이름', v)} /></Field>
              <Field label="현장담당자 소속"><TextInput value={draft.현장담당자_소속} onChange={(v) => update('현장담당자_소속', v)} /></Field>
              <Field label="현장담당자 연락처"><TextInput value={draft.현장담당자_연락처} onChange={(v) => update('현장담당자_연락처', v)} /></Field>
              <Field label="현장담당자 메일"><TextInput type="email" value={draft.현장담당자_메일} onChange={(v) => update('현장담당자_메일', v)} /></Field>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="준공완료일자"><TextInput type="date" value={draft.준공완료일자} onChange={(v) => update('준공완료일자', v)} /></Field>
              <Field label="오픈일자"><TextInput type="date" value={draft.오픈일자} onChange={(v) => update('오픈일자', v)} /></Field>
            </div>
            <Field label="준공서류 제출현황"><Select value={draft.준공진행} onChange={(v) => update('준공진행', v)} options={ENUMS.준공진행} /></Field>
          </FormSection>
        </div>
      );
    }

    // ============================================================
    // 정산 탭 (9개)
    // ============================================================
    function 정산Form({ draft, update }) {
      const margin = getMargin(draft);
      const marginRate = getMarginRate(draft);
      const autoSum = getMaipAutoSum(draft);
      return (
        <div className="space-y-6">
          <FormSection title="시공비 승인">
            <Field label="시공비 승인현황"><Select value={draft.정산진행} onChange={(v) => update('정산진행', v)} options={ENUMS.정산진행} /></Field>
          </FormSection>

          <FormSection title="보조금">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <Field label="금액 (원)"><NumInput value={draft.보조금} onChange={(v) => update('보조금', v)} /></Field>
              <Field label="신청일"><TextInput type="date" value={draft.보조금_신청일} onChange={(v) => update('보조금_신청일', v)} /></Field>
              <Field label="지급일"><TextInput type="date" value={draft.보조금_지급일} onChange={(v) => update('보조금_지급일', v)} /></Field>
            </div>
          </FormSection>

          <FormSection title="투자비 정리 (VAT 제외)">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="공사 매출 (원)"><NumInput value={draft.공사매출} onChange={(v) => update('공사매출', v)} /></Field>
              <Field label="공사 매입 (원)"><NumInput value={draft.공사매입} onChange={(v) => update('공사매입', v)} /></Field>
            </div>
            <AutoBox label="매입 자동 합계 (설계/견적 항목 + 영업비 + 부지사용료) — 참고용" value={autoSum.toLocaleString()} unit="원" />
            <div className="grid grid-cols-2 gap-4">
              <AutoBox label="마진 (공사매출 - 공사매입 + 보조금)" value={margin ? margin.toLocaleString() : '—'} unit="원" color={margin >= 0 ? 'text-emerald-700' : 'text-red-600'} />
              <AutoBox label="마진률" value={marginRate ? `${(marginRate * 100).toFixed(1)}%` : '—'} color={marginRate >= 0 ? 'text-emerald-700' : 'text-red-600'} />
            </div>
            <p className="text-xs text-stone-500">마진 = 공사 매출 − (공사 매입 − 보조금). 공사 매출은 고객사 청구 1회성 공사비.</p>
          </FormSection>
        </div>
      );
    }

    // ============================================================
    // 비고 탭 (1개)
    // ============================================================
    function 비고Form({ draft, update }) {
      return (
        <div className="space-y-6">
          <FormSection title="비고">
            <Field label="자유 메모"><Textarea value={draft.비고} onChange={(v) => update('비고', v)} rows={10} placeholder="현장 관련 자유 메모..." /></Field>
          </FormSection>
        </div>
      );
    }

    // 차원별 그룹핑 헬퍼
    const groupByDim = (sites, key) => {
      const map = {};
      sites.forEach((s) => {
        const v = (s[key] && String(s[key]).trim()) || '미분류';
        map[v] = (map[v] || 0) + 1;
      });
      return Object.entries(map)
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => b.count - a.count);
    };

    // 월별 그룹핑
    const groupByMonth = (sites, dateKey) => {
      const map = {};
      sites.forEach((s) => {
        const d = s[dateKey];
        if (!d || typeof d !== 'string' || d.length < 7) return;
        const m = d.slice(0, 7); // YYYY-MM
        map[m] = (map[m] || 0) + 1;
      });
      return map;
    };

    // 시계열 데이터 구성 (등록/준공/오픈 통합)
    const buildTimeline = (registered, completed, opened) => {
      const months = new Set([
        ...Object.keys(registered),
        ...Object.keys(completed),
        ...Object.keys(opened),
      ]);
      return Array.from(months).sort().map((m) => ({
        month: m,
        등록: registered[m] || 0,
        준공: completed[m] || 0,
        오픈: opened[m] || 0,
      }));
    };

    function Dashboard({ sites }) {
      const stats = useMemo(() => {
        const enriched = sites.map((s) => ({ ...s, _stage: getAutoStage(s), _prog: getProgress(s) }));
        const total = enriched.length;
        const active = enriched.filter((s) => s._stage && s._stage !== '준공' && s._stage !== '정산').length;
        const done = enriched.filter((s) => s._stage === '준공' || s._stage === '정산').length;
        const totalChannels = enriched.reduce((sum, s) => sum + getTotalChannels(s), 0);
        const totalKw = enriched.reduce((sum, s) => sum + getTotalKw(s), 0);
        const totalSubsidy = enriched.reduce((sum, s) => sum + Number(s.보조금 || 0), 0);
        const withRev = enriched.filter((s) => Number(s.공사매출 || 0) > 0);
        const avgMarginRate = withRev.length ? withRev.reduce((sum, s) => sum + getMarginRate(s), 0) / withRev.length : 0;
        const avgProgressRate = total ? enriched.reduce((sum, s) => sum + s._prog.progressRate, 0) / total : 0;
        const problemCount = enriched.filter((s) => s._prog.statuses.some((st) => st.status === 'problem')).length;
        const stageDistribution = STAGES.map((st) => ({ stage: st, count: enriched.filter((s) => s._stage === st).length }));
        const chargerSums = CHARGER_TYPES.map((t) => ({ type: t, count: enriched.reduce((sum, s) => sum + Number(s[t] || 0), 0) }));

        // 차원별
        const byRegion = groupByDim(enriched, '지역').slice(0, 10);
        const byInvestment = groupByDim(enriched, '투자유형');
        const byBuilding = groupByDim(enriched, '건물유형').slice(0, 8);

        // 시계열
        const timeline = buildTimeline(
          groupByMonth(enriched, '등록일자'),
          groupByMonth(enriched, '준공완료일자'),
          groupByMonth(enriched, '오픈일자')
        );

        return {
          total, active, done, totalChannels, totalKw, totalSubsidy, avgMarginRate, avgProgressRate, problemCount,
          stageDistribution, chargerSums, byRegion, byInvestment, byBuilding, timeline,
        };
      }, [sites]);

      return (
        <div>
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-stone-900">대시보드</h2>
            <p className="text-sm text-stone-500 mt-1">전체 사이트 현황 요약</p>
          </div>

          {sites.length === 0 ? (
            <div className="bg-white border border-stone-200 border-dashed rounded-lg py-16 px-6 text-center">
              <p className="text-stone-500">데이터가 없습니다. 먼저 사이트를 등록해주세요.</p>
            </div>
          ) : (
            <>
              {/* KPI 카드 */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <KpiCard IconComp={Icons.Building2} label="총 현장 수" value={stats.total} unit="개" color="#1E293B" />
                <KpiCard IconComp={Icons.Clock} label="진행 중" value={stats.active} unit="개" color="#2C5282" />
                <KpiCard IconComp={Icons.CheckCircle2} label="준공/정산" value={stats.done} unit="개" color="#10B981" />
                <KpiCard IconComp={Icons.BarChart3} label="평균 공정률" value={`${stats.avgProgressRate.toFixed(0)}`} unit="%" color="#06B6D4" />
                <KpiCard IconComp={Icons.Zap} label="총 채널" value={stats.totalChannels} unit="개" color="#F59E0B" />
                <KpiCard IconComp={Icons.TrendingUp} label="총 용량" value={stats.totalKw.toLocaleString()} unit="kW" color="#0EA5E9" />
                <KpiCard IconComp={Icons.DollarSign} label="보조금 합계" value={formatCurrency(stats.totalSubsidy)} unit="원" color="#8B5CF6" />
                <KpiCard IconComp={Icons.BarChart3} label="평균 마진률" value={`${(stats.avgMarginRate * 100).toFixed(1)}`} unit="%" color="#EC4899" />
              </div>

              {/* 보류 알림 */}
              {stats.problemCount > 0 && (
                <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-center gap-3">
                  <span className="text-2xl">⚠️</span>
                  <div>
                    <p className="text-sm font-semibold text-red-800">
                      <span className="num-mono">{stats.problemCount}</span>개 사이트에 보류/취소된 단계가 있습니다
                    </p>
                    <p className="text-xs text-red-700 mt-0.5">사이트 목록에서 "공정률 낮은 순"으로 정렬하면 빠르게 확인할 수 있습니다</p>
                  </div>
                </div>
              )}

              {/* 단계/충전기 차트 */}
              <SectionTitle>단계 · 충전기</SectionTitle>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <ChartCard title="단계별 사이트 분포">
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={stats.stageDistribution} margin={{ top: 10, right: 10, left: -10, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                      <XAxis dataKey="stage" tick={{ fontSize: 10, fill: '#57534E' }} interval={0} angle={-30} textAnchor="end" height={60} />
                      <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                      <Tooltip contentStyle={{ backgroundColor: '#FFFFFF', border: '1px solid #E5E5E0', borderRadius: 4, fontSize: 12 }} cursor={{ fill: '#F5F5F4' }} />
                      <Bar dataKey="count" radius={[4, 4, 0, 0]}>
                        {stats.stageDistribution.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </ChartCard>

                <ChartCard title="충전기 종류별 합계">
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={stats.chargerSums} margin={{ top: 10, right: 10, left: -10, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                      <XAxis dataKey="type" tick={{ fontSize: 10, fill: '#57534E' }} interval={0} angle={-30} textAnchor="end" height={60} />
                      <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                      <Tooltip contentStyle={{ backgroundColor: '#FFFFFF', border: '1px solid #E5E5E0', borderRadius: 4, fontSize: 12 }} cursor={{ fill: '#F5F5F4' }} />
                      <Bar dataKey="count" fill="#1E293B" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </ChartCard>
              </div>

              {/* 차원별 분석 */}
              <SectionTitle>차원별 분석</SectionTitle>
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <ChartCard title="지역별 (상위 10)">
                  {stats.byRegion.length === 0 ? <EmptyChart /> : (
                    <ResponsiveContainer width="100%" height={260}>
                      <BarChart data={stats.byRegion} layout="vertical" margin={{ top: 10, right: 10, left: 20, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                        <XAxis type="number" allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                        <YAxis dataKey="name" type="category" tick={{ fontSize: 11, fill: '#57534E' }} width={60} />
                        <Tooltip contentStyle={{ fontSize: 12 }} cursor={{ fill: '#F5F5F4' }} />
                        <Bar dataKey="count" fill="#0EA5E9" radius={[0, 4, 4, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  )}
                </ChartCard>

                <ChartCard title="투자유형별">
                  {stats.byInvestment.length === 0 ? <EmptyChart /> : (
                    <ResponsiveContainer width="100%" height={260}>
                      <PieChart>
                        <Pie data={stats.byInvestment} dataKey="count" nameKey="name" cx="50%" cy="45%" outerRadius={70} labelLine={false}
                          label={({ percent }) => percent > 0.08 ? `${(percent * 100).toFixed(0)}%` : ''}>
                          {stats.byInvestment.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                        </Pie>
                        <Tooltip contentStyle={{ fontSize: 12 }} formatter={(v, n) => [`${v}개`, n]} />
                        <Legend verticalAlign="bottom" iconSize={10} wrapperStyle={{ fontSize: 11, paddingTop: 10 }} />
                      </PieChart>
                    </ResponsiveContainer>
                  )}
                </ChartCard>

                <ChartCard title="건물유형별 (상위 8)">
                  {stats.byBuilding.length === 0 ? <EmptyChart /> : (
                    <ResponsiveContainer width="100%" height={260}>
                      <BarChart data={stats.byBuilding} margin={{ top: 10, right: 10, left: -10, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                        <XAxis dataKey="name" tick={{ fontSize: 10, fill: '#57534E' }} interval={0} angle={-25} textAnchor="end" height={50} />
                        <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                        <Tooltip contentStyle={{ fontSize: 12 }} cursor={{ fill: '#F5F5F4' }} />
                        <Bar dataKey="count" fill="#8B5CF6" radius={[4, 4, 0, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  )}
                </ChartCard>
              </div>

              {/* 시계열 */}
              <SectionTitle>월별 추이</SectionTitle>
              <ChartCard title="등록 · 준공 · 오픈 시계열">
                {stats.timeline.length === 0 ? <EmptyChart message="시계열 표시를 위한 일자 데이터가 부족합니다" /> : (
                  <ResponsiveContainer width="100%" height={300}>
                    <LineChart data={stats.timeline} margin={{ top: 10, right: 20, left: -10, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                      <XAxis dataKey="month" tick={{ fontSize: 11, fill: '#57534E' }} />
                      <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                      <Tooltip contentStyle={{ fontSize: 12 }} />
                      <Legend wrapperStyle={{ fontSize: 12 }} />
                      <Line type="monotone" dataKey="등록" stroke="#1E293B" strokeWidth={2} dot={{ r: 4 }} />
                      <Line type="monotone" dataKey="준공" stroke="#10B981" strokeWidth={2} dot={{ r: 4 }} />
                      <Line type="monotone" dataKey="오픈" stroke="#F59E0B" strokeWidth={2} dot={{ r: 4 }} />
                    </LineChart>
                  </ResponsiveContainer>
                )}
              </ChartCard>
            </>
          )}
        </div>
      );
    }

    function SectionTitle({ children }) {
      return (
        <h3 className="text-sm font-bold text-stone-700 uppercase tracking-wider mb-3 mt-2">{children}</h3>
      );
    }

    function EmptyChart({ message = '데이터가 부족합니다' }) {
      return (
        <div className="flex items-center justify-center h-[260px] text-sm text-stone-400">{message}</div>
      );
    }

    function KpiCard({ IconComp, label, value, unit, color }) {
      return (
        <div className="bg-white border border-stone-200 rounded-lg p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs text-stone-500 uppercase tracking-wider font-medium">{label}</div>
            <IconComp size={14} style={{ color }} />
          </div>
          <div className="flex items-baseline gap-1">
            <span className="text-2xl font-bold text-stone-900 num-mono">{value}</span>
            <span className="text-xs text-stone-500">{unit}</span>
          </div>
        </div>
      );
    }

    function ChartCard({ title, children }) {
      return (
        <div className="bg-white border border-stone-200 rounded-lg p-5">
          <h3 className="text-sm font-semibold text-stone-700 mb-4">{title}</h3>
          {children}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
