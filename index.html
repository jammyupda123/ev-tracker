<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV 충전기 트래커</title>

  <!-- Pretendard 한글 폰트 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (인-브라우저 JSX 컴파일) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <!-- Recharts (UMD) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>

  <!-- Firebase v10 compat (전역 firebase 객체) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }
    .num-mono {
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum';
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="env,react">
    // ====================================================================
    // 🔥 Firebase 설정 — 본인 값으로 수정하세요
    // Firebase 콘솔 → 프로젝트 설정 → 일반 → 내 앱 → SDK 설정 및 구성에서 복사
    // ====================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCn74ILvzpGcVsJKxGPi1-tNWX54Dj2MJY",
      authDomain: "ev-tracker-a29b3.firebaseapp.com",
      projectId: "ev-tracker-a29b3",
      storageBucket: "ev-tracker-a29b3.firebasestorage.app",
      messagingSenderId: "62785593665",
      appId: "1:62785593665:web:23f6d13c8231011a2441c0",
    };
    // ====================================================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

    // ============================================================
    // 아이콘 (Lucide SVG path 직접 작성)
    // ============================================================
    const I = ({ children, size = 16, className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className}>{children}</svg>
    );
    const Icons = {
      Search: (p) => <I {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></I>,
      Plus: (p) => <I {...p}><path d="M5 12h14"/><path d="M12 5v14"/></I>,
      LayoutGrid: (p) => <I {...p}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></I>,
      BarChart3: (p) => <I {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></I>,
      ChevronLeft: (p) => <I {...p}><path d="m15 18-6-6 6-6"/></I>,
      Trash2: (p) => <I {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></I>,
      Save: (p) => <I {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></I>,
      Building2: (p) => <I {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></I>,
      Zap: (p) => <I {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></I>,
      Filter: (p) => <I {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></I>,
      DollarSign: (p) => <I {...p}><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></I>,
      TrendingUp: (p) => <I {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></I>,
      Clock: (p) => <I {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></I>,
      CheckCircle2: (p) => <I {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></I>,
      LogOut: (p) => <I {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></I>,
      LogIn: (p) => <I {...p}><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></I>,
    };

    // ============================================================
    // 상수 및 enum 정의
    // ============================================================
    const STAGES = ['영업', '현장실사', '설계/견적', '계약', '착공', '시공', '준공', '정산'];

    const ENUMS = {
      투자유형: ['자체투자', '26환경부(완속)', '기타'],
      사업유형: ['신규', '교체', '철거'],
      공용비공용: ['공용', '비공용', '부분공용'],
      설치환경: ['실내', '실외'],
      영업진행: ['', '접수', '상담', '검토', '보류', '취소', '완료'],
      실사진행: ['', '일정조율', '보류', '취소', '완료'],
      설계진행: ['', '설계/견적', '보류', '취소', '완료'],
      계약진행: ['', '계약검토', '제안', '계약진행', '계약완료', '보류', '취소'],
      착공진행: ['', '서류접수', '서류완료', '일정조율', '보류', '취소', '착공완료'],
      시공진행: ['', '공사중', '공사완료', '보류'],
      준공진행: ['', '미제출', '제출', '완료'],
      정산진행: ['', '미승인', '승인진행', '승인완료'],
    };

    const KW_RATED = { 과금형: 3, '7kW벽부': 7, '7kW스탠드': 7, '50kW': 53, '100kW': 105 };
    const CHARGER_TYPES = ['과금형', '7kW벽부', '7kW스탠드', '50kW', '100kW'];
    const CHART_COLORS = ['#1E293B', '#334155', '#475569', '#64748B', '#94A3B8', '#CBD5E1'];

    const STAGE_BADGE_COLORS = {
      '영업': 'bg-blue-100 text-blue-800 border-blue-200',
      '현장실사': 'bg-green-100 text-green-800 border-green-200',
      '설계/견적': 'bg-yellow-100 text-yellow-800 border-yellow-200',
      '계약': 'bg-orange-100 text-orange-800 border-orange-200',
      '착공': 'bg-purple-100 text-purple-800 border-purple-200',
      '시공': 'bg-red-100 text-red-800 border-red-200',
      '준공': 'bg-cyan-100 text-cyan-800 border-cyan-200',
      '정산': 'bg-emerald-100 text-emerald-800 border-emerald-200',
    };

    // ============================================================
    // 헬퍼
    // ============================================================
    const getAutoStage = (s) => {
      if (s.정산진행) return '정산';
      if (s.준공진행) return '준공';
      if (s.시공진행) return '시공';
      if (s.착공진행) return '착공';
      if (s.계약진행) return '계약';
      if (s.설계진행) return '설계/견적';
      if (s.실사진행) return '현장실사';
      if (s.영업진행) return '영업';
      return '';
    };

    const getTotalKw = (s) => CHARGER_TYPES.reduce((sum, t) => sum + (Number(s[t] || 0) * KW_RATED[t]), 0);
    const getTotalChannels = (s) => CHARGER_TYPES.reduce((sum, t) => {
      const mult = t === '100kW' ? 2 : 1;
      return sum + Number(s[t] || 0) * mult;
    }, 0);

    const getMargin = (s) => {
      const rev = Number(s.공사매출 || 0);
      const cost = Number(s.공사매입 || 0);
      const sub = Number(s.보조금 || 0);
      return rev - (cost - sub);
    };

    const getMarginRate = (s) => {
      const rev = Number(s.공사매출 || 0);
      if (!rev) return 0;
      return getMargin(s) / rev;
    };

    const formatCurrency = (n) => {
      if (!n) return '—';
      if (n >= 100000000) return `${(n / 100000000).toFixed(1)}억`;
      if (n >= 10000) return `${(n / 10000).toFixed(0)}만`;
      return n.toLocaleString();
    };

    // ============================================================
    // 최상위 App
    // ============================================================
    function App() {
      const [user, setUser] = useState(null);
      const [authChecked, setAuthChecked] = useState(false);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => {
          setUser(u);
          setAuthChecked(true);
        });
        return unsub;
      }, []);

      if (!authChecked) {
        return (
          <div className="min-h-screen bg-stone-50 flex items-center justify-center text-stone-500">
            인증 확인 중…
          </div>
        );
      }

      if (!user) return <LoginScreen />;
      return <AuthenticatedApp user={user} />;
    }

    function LoginScreen() {
      const [loading, setLoading] = useState(false);
      const handleLogin = async () => {
        setLoading(true);
        try {
          await auth.signInWithPopup(googleProvider);
        } catch (e) {
          alert('로그인 실패: ' + e.message);
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-stone-50 flex items-center justify-center px-4">
          <div className="bg-white border border-stone-200 rounded-lg shadow-sm max-w-md w-full p-8 text-center">
            <div className="inline-flex items-center justify-center w-14 h-14 bg-slate-900 rounded-full mb-5">
              <Icons.Zap size={24} className="text-amber-400" />
            </div>
            <h1 className="text-2xl font-bold text-stone-900 mb-2">전기차 충전기 트래커</h1>
            <p className="text-sm text-stone-500 mb-8">CPO 영업~구축 전공정 관리</p>
            <button onClick={handleLogin} disabled={loading}
                    className="w-full px-4 py-3 bg-slate-900 hover:bg-slate-800 disabled:opacity-50 text-white font-semibold rounded transition-colors flex items-center justify-center gap-2">
              <Icons.LogIn size={18} /> {loading ? '로그인 중…' : 'Google로 로그인'}
            </button>
            <p className="text-xs text-stone-400 mt-6">
              로그인하면 본인 데이터에만 접근 가능합니다. 여러 디바이스에서 동기화됩니다.
            </p>
          </div>
        </div>
      );
    }

    function AuthenticatedApp({ user }) {
      const [view, setView] = useState('list');
      const [sites, setSites] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterStage, setFilterStage] = useState('전체');

      useEffect(() => {
        const sitesCol = db.collection('users').doc(user.uid).collection('sites');
        const unsub = sitesCol.onSnapshot(
          (snap) => {
            setSites(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
            setLoading(false);
          },
          (err) => {
            console.error('Firestore error', err);
            alert('데이터 로드 실패: ' + err.message);
            setLoading(false);
          }
        );
        return unsub;
      }, [user.uid]);

      const saveSite = async (site) => {
        try {
          const id = site.id || `s_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`;
          const data = {
            ...site,
            id,
            등록일자: site.등록일자 || new Date().toISOString().slice(0, 10),
            updatedAt: new Date().toISOString(),
          };
          await db.collection('users').doc(user.uid).collection('sites').doc(id).set(data);
          return id;
        } catch (e) {
          console.error('save error', e);
          alert('저장 실패: ' + e.message);
          return null;
        }
      };

      const deleteSite = async (id) => {
        if (!confirm('정말 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
        try {
          await db.collection('users').doc(user.uid).collection('sites').doc(id).delete();
          setView('list');
          setSelectedId(null);
        } catch (e) {
          console.error('delete error', e);
          alert('삭제 실패: ' + e.message);
        }
      };

      const handleLogout = async () => {
        if (!confirm('로그아웃 하시겠습니까?')) return;
        try { await auth.signOut(); } catch (e) { alert(e.message); }
      };

      const selectedSite = sites.find((s) => s.id === selectedId);

      return (
        <div className="min-h-screen bg-stone-50">
          <Header view={view} setView={setView} onNew={() => { setSelectedId(null); setView('editor'); }} user={user} onLogout={handleLogout} />
          <main className="max-w-7xl mx-auto px-6 py-8">
            {loading ? (
              <div className="text-center py-20 text-stone-500">불러오는 중…</div>
            ) : view === 'list' ? (
              <SiteList sites={sites} searchTerm={searchTerm} setSearchTerm={setSearchTerm}
                filterStage={filterStage} setFilterStage={setFilterStage}
                onEdit={(id) => { setSelectedId(id); setView('editor'); }}
                onNew={() => { setSelectedId(null); setView('editor'); }} />
            ) : view === 'editor' ? (
              <SiteEditor site={selectedSite} onSave={saveSite} onDelete={deleteSite}
                onCancel={() => { setView('list'); setSelectedId(null); }} />
            ) : (
              <Dashboard sites={sites} />
            )}
          </main>
        </div>
      );
    }

    function Header({ view, setView, onNew, user, onLogout }) {
      return (
        <header className="bg-slate-900 text-white border-b-4 border-amber-500">
          <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-2">
            <div>
              <h1 className="text-xl font-bold tracking-tight">전기차 충전기 워크플로우 트래커</h1>
              <p className="text-xs text-stone-400 mt-0.5">CPO 영업~구축 전공정 관리 v1.0</p>
            </div>
            <nav className="flex items-center gap-2 flex-wrap">
              <NavButton active={view === 'list'} onClick={() => setView('list')} IconComp={Icons.LayoutGrid}>사이트</NavButton>
              <NavButton active={view === 'dashboard'} onClick={() => setView('dashboard')} IconComp={Icons.BarChart3}>대시보드</NavButton>
              <button onClick={onNew}
                className="ml-2 px-4 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 text-sm font-semibold rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-amber-300">
                <Icons.Plus size={16} /> 새 사이트
              </button>
              <div className="ml-3 flex items-center gap-2 pl-3 border-l border-white/20">
                {user.photoURL && <img src={user.photoURL} alt="" className="w-7 h-7 rounded-full" />}
                <span className="text-xs text-stone-300 max-w-[120px] truncate" title={user.email}>
                  {user.displayName || user.email}
                </span>
                <button onClick={onLogout} title="로그아웃"
                  className="p-1.5 text-stone-300 hover:text-white hover:bg-white/10 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400">
                  <Icons.LogOut size={14} />
                </button>
              </div>
            </nav>
          </div>
        </header>
      );
    }

    function NavButton({ active, onClick, IconComp, children }) {
      return (
        <button onClick={onClick}
          className={`px-3 py-2 text-sm rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-amber-400 ${
            active ? 'bg-white text-slate-900 font-semibold' : 'text-stone-300 hover:text-white hover:bg-white/10'
          }`}>
          <IconComp size={16} /> {children}
        </button>
      );
    }

    function SiteList({ sites, searchTerm, setSearchTerm, filterStage, setFilterStage, onEdit, onNew }) {
      const filtered = useMemo(() => {
        const term = searchTerm.toLowerCase();
        return sites
          .map((s) => ({ ...s, _stage: getAutoStage(s) }))
          .filter((s) => {
            if (filterStage !== '전체' && s._stage !== filterStage) return false;
            if (!term) return true;
            return (
              (s.현장명 || '').toLowerCase().includes(term) ||
              (s.지역 || '').includes(term) ||
              (s.주소 || '').includes(term)
            );
          })
          .sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
      }, [sites, searchTerm, filterStage]);

      return (
        <div>
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-2xl font-bold text-stone-900">사이트 목록</h2>
              <p className="text-sm text-stone-500 mt-1">
                전체 <span className="num-mono font-semibold text-stone-900">{sites.length}</span>개 ·
                필터 결과 <span className="num-mono font-semibold text-stone-900">{filtered.length}</span>개
              </p>
            </div>
          </div>

          <div className="flex items-center gap-3 mb-6 flex-wrap">
            <div className="relative flex-1 min-w-[200px] max-w-md">
              <Icons.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400" />
              <input type="text" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                placeholder="현장명·지역·주소 검색"
                className="w-full pl-10 pr-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800" />
            </div>
            <div className="flex items-center gap-2">
              <Icons.Filter size={14} className="text-stone-500" />
              <select value={filterStage} onChange={(e) => setFilterStage(e.target.value)}
                className="px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800">
                <option>전체</option>
                {STAGES.map((s) => <option key={s}>{s}</option>)}
              </select>
            </div>
          </div>

          {filtered.length === 0 ? (
            <EmptyState onNew={onNew} hasData={sites.length > 0} />
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {filtered.map((s) => <SiteCard key={s.id} site={s} onClick={() => onEdit(s.id)} />)}
            </div>
          )}
        </div>
      );
    }

    function EmptyState({ onNew, hasData }) {
      return (
        <div className="bg-white border border-stone-200 border-dashed rounded-lg py-16 px-6 text-center">
          <div className="inline-flex items-center justify-center w-12 h-12 bg-stone-100 rounded-full mb-4">
            {hasData ? <Icons.Search size={20} className="text-stone-400" /> : <Icons.Building2 size={20} className="text-stone-400" />}
          </div>
          <p className="text-stone-700 font-medium mb-1">{hasData ? '검색 결과가 없습니다' : '등록된 사이트가 없습니다'}</p>
          <p className="text-sm text-stone-500 mb-4">
            {hasData ? '검색어나 필터를 변경해보세요' : '첫 사이트를 등록하여 시작하세요'}
          </p>
          {!hasData && (
            <button onClick={onNew}
              className="px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white text-sm font-medium rounded transition-colors inline-flex items-center gap-1.5">
              <Icons.Plus size={16} /> 새 사이트 등록
            </button>
          )}
        </div>
      );
    }

    function SiteCard({ site, onClick }) {
      const stage = getAutoStage(site);
      const channels = getTotalChannels(site);
      const kw = getTotalKw(site);
      const marginRate = getMarginRate(site);

      return (
        <button onClick={onClick}
          className="bg-white border border-stone-200 rounded-lg p-5 text-left hover:border-slate-800 hover:shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-slate-800 focus:ring-offset-2">
          <div className="flex items-start justify-between mb-3">
            <div className="flex-1 min-w-0">
              <h3 className="font-semibold text-stone-900 truncate">{site.현장명 || '(이름 없음)'}</h3>
              <p className="text-xs text-stone-500 mt-0.5 truncate">{site.지역 || '—'} · {site.건물유형 || '—'}</p>
            </div>
            {stage && <span className={`shrink-0 px-2 py-0.5 text-xs font-medium rounded border ${STAGE_BADGE_COLORS[stage]}`}>{stage}</span>}
          </div>
          <div className="grid grid-cols-3 gap-2 text-center pt-3 border-t border-stone-100">
            <Stat label="채널" value={channels || '—'} />
            <Stat label="kW" value={kw || '—'} />
            <Stat label="마진률" value={marginRate ? `${(marginRate * 100).toFixed(1)}%` : '—'} />
          </div>
        </button>

    function Stat({ label, value }) {
      return (
        <div>
          <div className="text-base font-semibold text-stone-900 num-mono">{value}</div>
          <div className="text-[10px] text-stone-500 uppercase tracking-wider mt-0.5">{label}</div>
        </div>
      );
    }

    function SiteEditor({ site, onSave, onDelete, onCancel }) {
      const [draft, setDraft] = useState(site || {});
      const [activeTab, setActiveTab] = useState('기본');
      const [saving, setSaving] = useState(false);

      useEffect(() => { setDraft(site || {}); }, [site]);
      const update = (k, v) => setDraft((d) => ({ ...d, [k]: v }));
      const isDirty = useMemo(() => JSON.stringify(site || {}) !== JSON.stringify(draft || {}), [site, draft]);
      const hasName = !!(draft.현장명 && draft.현장명.trim());

      const handleSave = async () => {
        if (!hasName) { alert('현장명은 필수입니다'); setActiveTab('기본'); return; }
        setSaving(true);
        await onSave(draft);
        setSaving(false);
        onCancel();
      };

      const handleBack = async () => {
        if (!isDirty) { onCancel(); return; }
        if (hasName) {
          setSaving(true);
          await onSave(draft);
          setSaving(false);
          onCancel();
        } else if (confirm('현장명이 비어있어 저장할 수 없습니다. 변경 사항을 폐기하고 목록으로 돌아갈까요?')) {
          onCancel();
        }
      };

      const tabs = ['기본', '충전기', '담당자', '진행', '정산'];

      return (
        <div>
          <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
            <button onClick={handleBack}
              className="flex items-center gap-1.5 px-3 py-2 text-sm text-stone-700 hover:bg-stone-100 rounded transition-colors focus:outline-none focus:ring-2 focus:ring-stone-400">
              <Icons.ChevronLeft size={16} /> 목록으로
              {isDirty && hasName && <span className="ml-1 text-xs text-emerald-700 font-medium">(자동 저장)</span>}
            </button>
            <div className="flex items-center gap-2">
              {isDirty && <span className="text-xs text-amber-700 font-medium px-2 py-1 bg-amber-50 rounded">변경 사항 있음</span>}
              {site && (
                <button onClick={() => onDelete(site.id)}
                  className="px-3 py-2 text-sm text-red-700 hover:bg-red-50 rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-red-400">
                  <Icons.Trash2 size={14} /> 삭제
                </button>
              )}
              <button onClick={handleSave} disabled={saving || !hasName}
                className="px-5 py-2 bg-slate-900 hover:bg-slate-800 disabled:bg-stone-300 disabled:text-stone-500 disabled:cursor-not-allowed text-white text-sm font-semibold rounded transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-amber-400">
                <Icons.Save size={14} /> {saving ? '저장 중…' : '저장하기'}
              </button>
            </div>
          </div>

          <div className="bg-white border border-stone-200 rounded-lg overflow-hidden">
            <div className="px-6 pt-6 pb-2 border-b border-stone-100">
              <h2 className="text-xl font-bold text-stone-900">
                {site ? draft.현장명 || '(이름 없음)' : '새 사이트 등록'}
              </h2>
              {site && (
                <p className="text-xs text-stone-500 mt-1 num-mono">
                  등록 {site.등록일자 || '—'} · 자동 단계 [{getAutoStage(draft) || '—'}]
                </p>
              )}
            </div>

            <div className="px-6 border-b border-stone-100 flex gap-1 overflow-x-auto">
              {tabs.map((t) => (
                <button key={t} onClick={() => setActiveTab(t)}
                  className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-inset ${
                    activeTab === t ? 'border-slate-800 text-slate-800 bg-stone-50' : 'border-transparent text-stone-600 hover:text-stone-900 hover:bg-stone-50'
                  }`}>
                  {t}
                </button>
              ))}
            </div>

            <div className="p-6 space-y-5">
              {activeTab === '기본' && <BasicForm draft={draft} update={update} />}
              {activeTab === '충전기' && <ChargerForm draft={draft} update={update} />}
              {activeTab === '담당자' && <PersonForm draft={draft} update={update} />}
              {activeTab === '진행' && <ProgressForm draft={draft} update={update} />}
              {activeTab === '정산' && <SettlementForm draft={draft} update={update} />}
            </div>
          </div>
        </div>
      );
    }

    const Field = ({ label, children, required }) => (
      <div>
        <label className="block text-xs font-semibold text-stone-600 mb-1.5 uppercase tracking-wider">
          {label} {required && <span className="text-red-500">*</span>}
        </label>
        {children}
      </div>
    );

    const TextInput = ({ value, onChange, placeholder, type = 'text' }) => (
      <input type={type} value={value || ''} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800" />
    );

    const NumInput = ({ value, onChange, placeholder }) => (
      <input type="number" value={value ?? ''}
        onChange={(e) => onChange(e.target.value === '' ? '' : Number(e.target.value))} placeholder={placeholder}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm num-mono focus:outline-none focus:border-slate-800" />
    );

    const Select = ({ value, onChange, options, placeholder }) => (
      <select value={value || ''} onChange={(e) => onChange(e.target.value)}
        className="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:border-slate-800">
        <option value="">{placeholder || '선택…'}</option>
        {options.filter((o) => o).map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    );

    const MultiCheck = ({ value = [], onChange, options }) => {
      const set = new Set(value);
      const toggle = (o) => {
        const next = new Set(set);
        if (next.has(o)) next.delete(o); else next.add(o);
        onChange(Array.from(next));
      };
      return (
        <div className="flex flex-wrap gap-2">
          {options.map((o) => (
            <button key={o} type="button" onClick={() => toggle(o)}
              className={`px-3 py-1.5 text-sm border rounded transition-colors ${
                set.has(o) ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-stone-300 text-stone-700 hover:border-stone-400'
              }`}>
              {o}
            </button>
          ))}
        </div>
      );
    };

    function BasicForm({ draft, update }) {
      return (
        <>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <Field label="현장명" required>
              <TextInput value={draft.현장명} onChange={(v) => update('현장명', v)} placeholder="예: 서울 강남 OO빌딩" />
            </Field>
            <Field label="지역"><TextInput value={draft.지역} onChange={(v) => update('지역', v)} placeholder="예: 서울" /></Field>
          </div>
          <Field label="주소"><TextInput value={draft.주소} onChange={(v) => update('주소', v)} placeholder="상세 주소" /></Field>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <Field label="건물유형"><TextInput value={draft.건물유형} onChange={(v) => update('건물유형', v)} placeholder="예: 아파트, 오피스텔" /></Field>
            <Field label="투자유형"><Select value={draft.투자유형} onChange={(v) => update('투자유형', v)} options={ENUMS.투자유형} /></Field>
          </div>
          <Field label="사업유형 (다중 선택 가능)">
            <MultiCheck value={draft.사업유형} onChange={(v) => update('사업유형', v)} options={ENUMS.사업유형} />
          </Field>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <Field label="공용/비공용"><Select value={draft.공용비공용} onChange={(v) => update('공용비공용', v)} options={ENUMS.공용비공용} /></Field>
            <Field label="설치환경"><Select value={draft.설치환경} onChange={(v) => update('설치환경', v)} options={ENUMS.설치환경} /></Field>
            <Field label="주차면 수"><NumInput value={draft.주차면} onChange={(v) => update('주차면', v)} placeholder="0" /></Field>
          </div>
          <Field label="의무수량"><NumInput value={draft.의무수량} onChange={(v) => update('의무수량', v)} placeholder="0" /></Field>
        </>
      );
    }

    function ChargerForm({ draft, update }) {
      const totalKw = getTotalKw(draft);
      const totalCh = getTotalChannels(draft);
      return (
        <>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {CHARGER_TYPES.map((t) => (
              <Field key={t} label={`${t} (개)`}>
                <NumInput value={draft[t]} onChange={(v) => update(t, v)} placeholder="0" />
              </Field>
            ))}
          </div>
          <div className="mt-4 p-4 bg-stone-50 border border-stone-200 rounded-lg flex items-center justify-around">
            <div className="text-center">
              <div className="text-2xl font-bold text-slate-800 num-mono">{totalCh}</div>
              <div className="text-xs text-stone-500 mt-1 uppercase tracking-wider">총 채널 (개)</div>
            </div>
            <div className="w-px h-12 bg-stone-200" />
            <div className="text-center">
              <div className="text-2xl font-bold text-slate-800 num-mono">{totalKw}</div>
              <div className="text-xs text-stone-500 mt-1 uppercase tracking-wider">총 용량 (kW)</div>
            </div>
          </div>
          <p className="text-xs text-stone-500 mt-2">
            정격: 과금형 3kW, 7kW(벽부/스탠드) 7kW, 50kW(53), 100kW(105). 100kW만 2채널로 계산.
          </p>
        </>
      );
    }

    function PersonForm({ draft, update }) {
      return (
        <>
          <div>
            <h3 className="text-xs font-bold text-stone-600 uppercase tracking-wider mb-3 pb-2 border-b border-stone-100">내부 담당자</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="HEV 영업 담당자"><TextInput value={draft.HEV영업담당자} onChange={(v) => update('HEV영업담당자', v)} /></Field>
              <Field label="HEV 시공 담당자"><TextInput value={draft.HEV시공담당자} onChange={(v) => update('HEV시공담당자', v)} /></Field>
            </div>
          </div>
          <div className="mt-6">
            <h3 className="text-xs font-bold text-stone-600 uppercase tracking-wider mb-3 pb-2 border-b border-stone-100">현장담당자 (발주처)</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="이름"><TextInput value={draft.현장담당자_이름} onChange={(v) => update('현장담당자_이름', v)} /></Field>
              <Field label="소속"><TextInput value={draft.현장담당자_소속} onChange={(v) => update('현장담당자_소속', v)} /></Field>
              <Field label="연락처"><TextInput value={draft.현장담당자_연락처} onChange={(v) => update('현장담당자_연락처', v)} /></Field>
              <Field label="메일"><TextInput value={draft.현장담당자_메일} onChange={(v) => update('현장담당자_메일', v)} type="email" /></Field>
            </div>
          </div>
          <div className="mt-6">
            <h3 className="text-xs font-bold text-stone-600 uppercase tracking-wider mb-3 pb-2 border-b border-stone-100">시공사</h3>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <Field label="시공사"><TextInput value={draft.시공사} onChange={(v) => update('시공사', v)} /></Field>
              <Field label="시공사 담당자"><TextInput value={draft.시공사담당자} onChange={(v) => update('시공사담당자', v)} /></Field>
            </div>
          </div>
        </>
      );
    }

    function ProgressForm({ draft, update }) {
      const stages = [
        ['영업', '영업진행', ENUMS.영업진행],
        ['현장실사', '실사진행', ENUMS.실사진행],
        ['설계/견적', '설계진행', ENUMS.설계진행],
        ['계약', '계약진행', ENUMS.계약진행],
        ['착공', '착공진행', ENUMS.착공진행],
        ['시공', '시공진행', ENUMS.시공진행],
        ['준공', '준공진행', ENUMS.준공진행],
        ['정산', '정산진행', ENUMS.정산진행],
      ];
      return (
        <>
          <p className="text-xs text-stone-500 mb-3">
            각 단계 진행현황을 입력하면 가장 진행된 단계가 사이트의 현재 단계로 자동 결정됩니다.
          </p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {stages.map(([label, key, opts]) => (
              <Field key={key} label={label}>
                <Select value={draft[key]} onChange={(v) => update(key, v)} options={opts} />
              </Field>
            ))}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-5 pt-5 border-t border-stone-100">
            <Field label="준공완료일자"><TextInput type="date" value={draft.준공완료일자} onChange={(v) => update('준공완료일자', v)} /></Field>
            <Field label="오픈일자"><TextInput type="date" value={draft.오픈일자} onChange={(v) => update('오픈일자', v)} /></Field>
          </div>
        </>
      );
    }

    function SettlementForm({ draft, update }) {
      const margin = getMargin(draft);
      const marginRate = getMarginRate(draft);
      return (
        <>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <Field label="보조금 (원)"><NumInput value={draft.보조금} onChange={(v) => update('보조금', v)} placeholder="0" /></Field>
            <Field label="공사 매출 (원)"><NumInput value={draft.공사매출} onChange={(v) => update('공사매출', v)} placeholder="0" /></Field>
            <Field label="공사 매입 (원)"><NumInput value={draft.공사매입} onChange={(v) => update('공사매입', v)} placeholder="0" /></Field>
          </div>
          <div className="mt-4 p-4 bg-stone-50 border border-stone-200 rounded-lg grid grid-cols-2 gap-4">
            <div className="text-center">
              <div className={`text-2xl font-bold num-mono ${margin >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                {margin ? margin.toLocaleString() : '—'}
              </div>
              <div className="text-xs text-stone-500 mt-1 uppercase tracking-wider">마진 (원)</div>
            </div>
            <div className="text-center">
              <div className={`text-2xl font-bold num-mono ${marginRate >= 0 ? 'text-emerald-700' : 'text-red-600'}`}>
                {marginRate ? `${(marginRate * 100).toFixed(1)}%` : '—'}
              </div>
              <div className="text-xs text-stone-500 mt-1 uppercase tracking-wider">마진률</div>
            </div>
          </div>
          <p className="text-xs text-stone-500 mt-2">
            마진 = 공사 매출 − (공사 매입 − 보조금). 공사 매출은 고객사 청구 1회성 공사비.
          </p>
        </>
      );
    }

    function Dashboard({ sites }) {
      const stats = useMemo(() => {
        const enriched = sites.map((s) => ({ ...s, _stage: getAutoStage(s) }));
        const total = enriched.length;
        const active = enriched.filter((s) => s._stage && s._stage !== '준공' && s._stage !== '정산').length;
        const done = enriched.filter((s) => s._stage === '준공' || s._stage === '정산').length;
        const totalChannels = enriched.reduce((sum, s) => sum + getTotalChannels(s), 0);
        const totalKw = enriched.reduce((sum, s) => sum + getTotalKw(s), 0);
        const totalSubsidy = enriched.reduce((sum, s) => sum + Number(s.보조금 || 0), 0);
        const withRev = enriched.filter((s) => Number(s.공사매출 || 0) > 0);
        const avgMarginRate = withRev.length ? withRev.reduce((sum, s) => sum + getMarginRate(s), 0) / withRev.length : 0;
        const stageDistribution = STAGES.map((st) => ({ stage: st, count: enriched.filter((s) => s._stage === st).length }));
        const chargerSums = CHARGER_TYPES.map((t) => ({ type: t, count: enriched.reduce((sum, s) => sum + Number(s[t] || 0), 0) }));
        return { total, active, done, totalChannels, totalKw, totalSubsidy, avgMarginRate, stageDistribution, chargerSums };
      }, [sites]);

      return (
        <div>
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-stone-900">대시보드</h2>
            <p className="text-sm text-stone-500 mt-1">전체 사이트 현황 요약</p>
          </div>

          {sites.length === 0 ? (
            <div className="bg-white border border-stone-200 border-dashed rounded-lg py-16 px-6 text-center">
              <p className="text-stone-500">데이터가 없습니다. 먼저 사이트를 등록해주세요.</p>
            </div>
          ) : (
            <>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <KpiCard IconComp={Icons.Building2} label="총 현장 수" value={stats.total} unit="개" color="#1E293B" />
                <KpiCard IconComp={Icons.Clock} label="진행 중" value={stats.active} unit="개" color="#2C5282" />
                <KpiCard IconComp={Icons.CheckCircle2} label="준공/정산" value={stats.done} unit="개" color="#10B981" />
                <KpiCard IconComp={Icons.Zap} label="총 채널" value={stats.totalChannels} unit="개" color="#F59E0B" />
                <KpiCard IconComp={Icons.TrendingUp} label="총 용량" value={stats.totalKw.toLocaleString()} unit="kW" color="#0EA5E9" />
                <KpiCard IconComp={Icons.DollarSign} label="보조금 합계" value={formatCurrency(stats.totalSubsidy)} unit="원" color="#8B5CF6" />
                <KpiCard IconComp={Icons.BarChart3} label="평균 마진률" value={`${(stats.avgMarginRate * 100).toFixed(1)}`} unit="%" color="#EC4899" />
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <ChartCard title="단계별 사이트 분포">
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={stats.stageDistribution} margin={{ top: 10, right: 10, left: -10, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                      <XAxis dataKey="stage" tick={{ fontSize: 11, fill: '#57534E' }} />
                      <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                      <Tooltip contentStyle={{ backgroundColor: '#FFFFFF', border: '1px solid #E5E5E0', borderRadius: 4, fontSize: 12 }} cursor={{ fill: '#F5F5F4' }} />
                      <Bar dataKey="count" radius={[4, 4, 0, 0]}>
                        {stats.stageDistribution.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </ChartCard>

                <ChartCard title="충전기 종류별 합계">
                  <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={stats.chargerSums} margin={{ top: 10, right: 10, left: -10, bottom: 5 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#E5E5E0" />
                      <XAxis dataKey="type" tick={{ fontSize: 11, fill: '#57534E' }} />
                      <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#57534E' }} />
                      <Tooltip contentStyle={{ backgroundColor: '#FFFFFF', border: '1px solid #E5E5E0', borderRadius: 4, fontSize: 12 }} cursor={{ fill: '#F5F5F4' }} />
                      <Bar dataKey="count" fill="#1E293B" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </ChartCard>
              </div>
            </>
          )}
        </div>
      );
    }

    function KpiCard({ IconComp, label, value, unit, color }) {
      return (
        <div className="bg-white border border-stone-200 rounded-lg p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs text-stone-500 uppercase tracking-wider font-medium">{label}</div>
            <IconComp size={14} style={{ color }} />
          </div>
          <div className="flex items-baseline gap-1">
            <span className="text-2xl font-bold text-stone-900 num-mono">{value}</span>
            <span className="text-xs text-stone-500">{unit}</span>
          </div>
        </div>
      );
    }

    function ChartCard({ title, children }) {
      return (
        <div className="bg-white border border-stone-200 rounded-lg p-5">
          <h3 className="text-sm font-semibold text-stone-700 mb-4">{title}</h3>
          {children}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
